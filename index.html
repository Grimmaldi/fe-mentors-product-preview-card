<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/css/style.css">
    <title>Reproducing Frontend Mentors' Product Preview Card Challenge</title>
</head>
<body>
    <main>
        <div class="container">
            <picture class="product-image">
                <img src="./assets/images/image-product-desktop.jpg" alt="A bottle of Gabrielle Essence Eau De Parfum placed on an angle between two leafy branches.">
            </picture>
            <div class="product-information">
                <h2 class="category">PERFUME</h2>
                <h1 class="product-name">Gabrielle Essence Eau De Parfum</h1>
                <p class="product-description">A floral, solar and voluptuous interpretation composed by Oliver Polge, Perfumer-Creator for the house of CHANEL.</p>
                <div class="price">
                    <p class="current-price">&dollar;149.99</p>
                    <p class="original-price">&dollar;169.99</p>
                </div>
                <button>Add to Cart</button>
            </div>
        </div>
    </main>
</body>
</html>
